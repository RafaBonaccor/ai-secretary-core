spring:
  application:
    name: assistant-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/assistant_core}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: assistant_core
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: assistant_core
    schemas: assistant_core

server:
  port: ${SERVER_PORT:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  evolution:
    base-url: ${EVOLUTION_BASE_URL:http://localhost:8080}
    api-key: ${EVOLUTION_API_KEY:change_me_local_api_key}
    webhook-base-url: ${APP_WEBHOOK_BASE_URL:http://host.docker.internal:8090}
  openai:
    base-url: ${OPENAI_BASE_URL:http://host.docker.internal:8000/v1}
    api-key: ${OPENAI_API_KEY:local-test-key}
    model: ${OPENAI_MODEL:gpt-5.4}
  google:
    oauth:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:http://127.0.0.1:8090/api/v1/oauth/google/calendar/callback}
      token-encryption-secret: ${GOOGLE_OAUTH_TOKEN_ENCRYPTION_SECRET:}
  whatsapp-business:
    access-token: ${WHATSAPP_BUSINESS_ACCESS_TOKEN:}
  security:
    basic:
      username: ${APP_BASIC_AUTH_USERNAME:assistant_admin}
      password: ${APP_BASIC_AUTH_PASSWORD:change_me_assistant_password}
