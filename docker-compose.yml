services:
  postgres:
    image: postgres:16-alpine
    container_name: assistant_core_postgres
    environment:
      POSTGRES_DB: assistant_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - assistant_core_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assistant_core"]
      interval: 10s
      timeout: 5s
      retries: 10

  assistant-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistant_core_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/assistant_core
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8090
      EVOLUTION_BASE_URL: http://host.docker.internal:8080
      EVOLUTION_API_KEY: change_me_local_api_key
      OPENAI_BASE_URL: http://host.docker.internal:8000/v1
      OPENAI_API_KEY: local-test-key
      OPENAI_MODEL: gpt-5.4
      APP_BASIC_AUTH_USERNAME: assistant_admin
      APP_BASIC_AUTH_PASSWORD: change_me_assistant_password
    ports:
      - "8090:8090"

volumes:
  assistant_core_postgres_data:
